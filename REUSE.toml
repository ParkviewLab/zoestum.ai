# REUSE/SPDX annotations (https://reuse.software/). Catch-alls cover whole trees;
# per-file SPDX headers on HTML/Python/shell win where present. The site is standard
# copyright (all rights reserved); the bundled font keeps its own license.
# Verify: uvx --from "reuse[charset-normalizer]" reuse lint
version = 1

SPDX-PackageName = "zoestum.ai"
SPDX-PackageSupplier = "Gary Frattarola <garyf@parkviewlab.ai>"

# First-party docs, config, generated AI pointers, and CI → all rights reserved.
[[annotations]]
path = ["README.md", "LICENSING.md", "docs/**", "AGENTS.md", "CLAUDE.md", "CNAME", ".gitignore", "REUSE.toml", ".github/**"]
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 Gary Frattarola <garyf@parkviewlab.ai>"
SPDX-License-Identifier = "LicenseRef-AllRightsReserved"

# Brand logo/marks → all rights reserved (Gary's marks).
[[annotations]]
path = ["assets/img/**"]
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 Gary Frattarola <garyf@parkviewlab.ai>"
SPDX-License-Identifier = "LicenseRef-AllRightsReserved"

# Bundled Michroma typeface → third-party, SIL Open Font License 1.1.
[[annotations]]
path = ["assets/fonts/**"]
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 The Michroma Project Authors"
SPDX-License-Identifier = "OFL-1.1"
